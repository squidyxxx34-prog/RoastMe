<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RoastMine — Roast Result</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --black:#090909;--charcoal:#111;--border:#222;--border2:#2e2e2e;
  --grey:#444;--muted:#666;--light:#999;--cream:#e8e3da;--white:#f4f0e8;
  --red:#bf2c1f;--orange:#d9822b;--green:#4caf6e;
  --font-d:'DM Serif Display',serif;--font-m:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:var(--black);color:var(--cream);font-family:var(--font-m);font-size:14px;line-height:1.65;overflow-x:hidden;cursor:crosshair;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 48px,rgba(255,255,255,.015) 48px,rgba(255,255,255,.015) 49px),radial-gradient(circle at 88% 12%,rgba(191,44,31,.14),transparent 34%);pointer-events:none;z-index:-1;}
::selection{background:var(--red);color:#fff;}
a{color:inherit;text-decoration:none;}
button{cursor:crosshair;font-family:var(--font-m);}
nav{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:1px solid var(--border);background:rgba(9,9,9,.96);backdrop-filter:blur(12px);}
.logo{font-family:var(--font-d);font-size:20px;color:var(--white);display:flex;align-items:center;gap:8px;}
.logo-flame{color:var(--red);font-style:italic;}
.nav-link{font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);transition:color .15s;}
.nav-link:hover{color:var(--white);}
main{width:min(760px,calc(100% - 40px));margin:0 auto;padding:64px 0 88px;}
.loading{min-height:calc(100vh - 72px);display:grid;place-items:center;text-align:center;}
.loading-card{width:min(620px,100%);border:1px solid var(--border);background:rgba(17,17,17,.78);padding:58px 42px;box-shadow:0 30px 120px rgba(0,0,0,.36);}
.loader-mark{width:58px;height:58px;margin:0 auto 28px;border:1px solid var(--border2);display:grid;place-items:center;color:var(--red);font-family:var(--font-d);font-size:30px;animation:pulse 1.1s ease-in-out infinite;}
.loading h1{font-family:var(--font-d);font-size:clamp(42px,7vw,76px);line-height:.95;color:var(--white);letter-spacing:-1px;margin-bottom:20px;}
.loading p{color:var(--light);font-weight:300;}
.dots::after{content:'';animation:dots 1.3s steps(4,end) infinite;}
@keyframes pulse{0%,100%{transform:scale(1);border-color:var(--border2);}50%{transform:scale(1.08);border-color:var(--red);box-shadow:0 0 42px rgba(191,44,31,.22);}}
@keyframes dots{0%{content:'';}25%{content:'.';}50%{content:'..';}75%,100%{content:'...';}}
.result{display:none;}
.result.active{display:block;animation:up .55s ease both;}
@keyframes up{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.result-box{border:1px solid var(--border2);background:rgba(17,17,17,.74);padding:22px 24px;margin-bottom:46px;box-shadow:0 30px 100px rgba(0,0,0,.24);}
.result-box-title{font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--white);margin-bottom:6px;}
.result-url{font-size:13px;color:var(--light);word-break:break-all;}
.score-block{text-align:center;margin:0 auto 42px;}
.score-label{font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.score-value{font-family:var(--font-d);font-size:clamp(58px,12vw,104px);line-height:.9;color:var(--score-color,var(--red));letter-spacing:-1px;}
.score-value span{font-family:var(--font-m);font-size:18px;color:var(--grey);letter-spacing:0;}
.score-line{font-size:15px;color:var(--white);margin-top:18px;font-style:italic;}
.rule{height:1px;background:var(--border2);margin:38px 0;}
.section-title{font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--white);margin-bottom:18px;}
.verdict-text{font-size:17px;color:var(--cream);line-height:1.85;white-space:pre-line;}
.breakdown{display:grid;gap:11px;}
.breakdown-row{display:grid;grid-template-columns:132px 58px 1fr;gap:14px;align-items:start;color:var(--light);}
.breakdown-name{color:var(--white);font-weight:600;}
.breakdown-score{color:var(--score-color,var(--red));white-space:nowrap;}
.breakdown-comment{color:var(--light);}
.bullet-list{list-style:none;display:grid;gap:10px;color:var(--light);}
.bullet-list li{display:grid;grid-template-columns:auto 1fr;gap:12px;}
.bullet-list li::before{content:'•';color:var(--red);font-weight:600;}
.share-line-box{border:1px solid var(--border2);background:rgba(255,255,255,.018);padding:24px;margin-bottom:24px;text-align:center;}
.share-line-text{font-size:18px;line-height:1.55;color:var(--white);font-style:italic;}
.share-actions{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;}
.btn{border:1px solid var(--border2);background:transparent;color:var(--cream);padding:13px 24px;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;transition:background .15s,color .15s,border-color .15s;}
.btn:hover{border-color:var(--red);color:var(--white);}
.btn-primary{background:var(--white);color:var(--black);border-color:var(--white);}
.btn-primary:hover{background:var(--red);border-color:var(--red);color:#fff;}
.copy-status{display:none;margin-top:16px;color:var(--green);font-size:11px;text-align:center;}
.empty-url{border:1px solid var(--border);background:rgba(17,17,17,.78);padding:44px;margin-top:34px;color:var(--light);}
.empty-url h1{font-family:var(--font-d);font-size:clamp(48px,8vw,84px);line-height:.95;color:var(--white);margin-bottom:18px;}
.empty-url a{color:var(--white);border-bottom:1px solid var(--red);}
@media(max-width:720px){nav{padding:16px 20px;}main{padding:44px 0 68px;}.breakdown-row{grid-template-columns:1fr;gap:2px;border-bottom:1px solid var(--border);padding-bottom:12px;}.breakdown-row:last-child{border-bottom:none;padding-bottom:0;}.score-line{font-size:13px;}.share-line-text{font-size:16px;}}
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">RoastMine <span class="logo-flame">✶</span></a>
  <a class="nav-link" href="index.html">New roast</a>
</nav>

<main>
  <section class="loading" id="loadingScreen" aria-live="polite">
    <div class="loading-card">
      <div class="loader-mark">✶</div>
      <h1>Roast Result</h1>
      <p><span class="dots">Analyzing your website</span></p>
    </div>
  </section>

  <section class="result" id="resultScreen">
    <header class="result-box">
      <div class="result-box-title">Roast Result</div>
      <div class="result-url" id="displayUrl"></div>
    </header>

    <section class="score-block" aria-label="Website score">
      <div class="score-label">Score</div>
      <div class="score-value"><span id="globalScore">0</span> <span>/ 100</span></div>
      <div class="score-line" id="scoreLine"></div>
    </section>

    <div class="rule"></div>

    <section>
      <h2 class="section-title">Verdict</h2>
      <p class="verdict-text" id="verdictText"></p>
    </section>

    <div class="rule"></div>

    <section>
      <h2 class="section-title">Breakdown</h2>
      <div class="breakdown" id="breakdownList"></div>
    </section>

    <div class="rule"></div>

    <section>
      <h2 class="section-title">Main Problems</h2>
      <ul class="bullet-list" id="problemsList"></ul>
    </section>

    <div class="rule"></div>

    <section>
      <h2 class="section-title">Quick Fixes</h2>
      <ul class="bullet-list" id="fixesList"></ul>
    </section>

    <div class="rule"></div>

    <section>
      <h2 class="section-title">Share Line</h2>
      <div class="share-line-box">
        <p class="share-line-text" id="shareLine"></p>
      </div>
      <div class="share-actions">
        <button class="btn btn-primary" id="copyButton" type="button">Copy</button>
        <a class="btn" id="shareX" target="_blank" rel="noopener">Share</a>
      </div>
      <div class="copy-status" id="copyStatus">Copied. Now go make your timeline uncomfortable.</div>
    </section>

    <div class="rule"></div>
  </section>
</main>

<script>
const ROAST_RESULT_PROMPT = `You are RoastMine AI.

Analyze the submitted website and return the roast in this exact user-facing format:

ROAST RESULT
{url}

SCORE
{score} / 100
"{one sharp score line}"

VERDICT
3 short sentences. Brutal, useful, conversion-focused.

BREAKDOWN
Design        {score}/10  → {one sentence}
Copywriting   {score}/10  → {one sentence}
Conversion    {score}/10  → {one sentence}
UX            {score}/10  → {one sentence}
Trust         {score}/10  → {one sentence}

MAIN PROBLEMS
5 bullets only. No fluff.

QUICK FIXES
5 bullets only. Extremely actionable.

SHARE LINE
"{one viral brutal sentence}"

Rules:
- Be direct, concise, and slightly aggressive without being insulting.
- No generic advice.
- Every sentence must feel like a real product critique.
- Focus on conversion, clarity, trust, UX, and copywriting.`;

const params = new URLSearchParams(window.location.search);
const submittedUrl = params.get('url');
const loadingScreen = document.getElementById('loadingScreen');
const resultScreen = document.getElementById('resultScreen');

const breakdownTemplates = {
  Design: [
    'Clean, but lacks hierarchy and focus.',
    'Polished enough to pass, not sharp enough to guide attention.',
    'Looks composed, but the eye has no obvious place to land.'
  ],
  Copywriting: [
    'Describes features, not value.',
    'Talks like a product sheet when it needs to sound like a buyer outcome.',
    'Too much explanation, not enough reason to care.'
  ],
  Conversion: [
    'No strong CTA or urgency.',
    'The page gives visitors too many chances to do nothing.',
    'The next step exists, but it does not feel important.'
  ],
  UX: [
    'Usable but directionless.',
    'The path is technically clear, emotionally weak.',
    'Nothing is broken, but nothing pushes the user forward either.'
  ],
  Trust: [
    'No proof or credibility signals.',
    'The claim is bigger than the evidence supporting it.',
    'Trust arrives too late for a skeptical visitor.'
  ]
};

const verdicts = [
  [
    'Your website is not confusing — it is just forgettable.',
    'Nothing creates urgency or attention in the first seconds.',
    'It looks complete, but it does not perform.'
  ],
  [
    'Your website has the shape of a landing page and the persuasion of a waiting room poster.',
    'The offer is present, but the reason to act is weak.',
    'People can understand it and still feel absolutely nothing.'
  ],
  [
    'Your website is clean enough to avoid embarrassment, which is not the same as converting.',
    'The first screen fails to create a sharp reason to stay.',
    'It explains the product, then forgets to sell the outcome.'
  ],
  [
    'Your website looks like it was designed by someone who wanted approval, not action.',
    'The page is tidy, but tidy does not create demand.',
    'The funnel needs pressure, proof, and a clearer promise.'
  ]
];

const scoreLines = [
  'Fails at convincing users to care',
  'Looks fine, sells weakly',
  'Too polished to ignore, too vague to convert',
  'Competent design, undercooked persuasion'
];

const mainProblems = [
  'No clear value proposition in first 3 seconds',
  'Weak CTA visibility',
  'No emotional hook',
  'No trust signals',
  'No differentiation',
  'The hero section makes visitors work too hard',
  'The page does not create urgency',
  'The offer sounds interchangeable'
];

const quickFixes = [
  'Rewrite hero section to state clear outcome',
  'Make CTA dominant and repeated',
  'Add social proof above fold',
  'Remove non-essential sections',
  'Focus page on single action',
  'Replace feature claims with buyer outcomes',
  'Add one proof point beside the first CTA',
  'Cut any headline a competitor could reuse'
];

const shareLines = [
  'This website does not fail at design — it fails at convincing anyone to care.',
  'This site looks finished, but the persuasion clocked out early.',
  'The page is clean, but clean does not pay the bills if nobody clicks.',
  'This website is not broken; it is just aggressively forgettable.'
];

function hashUrl(url) {
  return [...url].reduce((hash, char) => ((hash << 5) - hash + char.charCodeAt(0)) | 0, 0);
}

function pick(items, seed, offset = 0) {
  return items[Math.abs(seed + offset) % items.length];
}

function rotatePick(items, seed, count) {
  const start = Math.abs(seed) % items.length;
  return Array.from({ length: count }, (_, index) => items[(start + index) % items.length]);
}

function normalizeUrl(url) {
  if (!url) return null;
  try {
    const parsed = new URL(url);
    if (!['http:', 'https:'].includes(parsed.protocol)) return null;
    return parsed.href;
  } catch (error) {
    return null;
  }
}

function generateRoastResult(url) {
  const prompt = ROAST_RESULT_PROMPT.replace('{url}', url);
  const seed = hashUrl(prompt);
  const score = Math.max(24, Math.min(88, 50 + (seed % 39)));
  const categories = ['Design', 'Copywriting', 'Conversion', 'UX', 'Trust'];

  return {
    url,
    score,
    scoreLine: pick(scoreLines, seed),
    verdict: pick(verdicts, seed).join('\n'),
    breakdown: categories.map((name, index) => ({
      name,
      score: Math.max(3, Math.min(8, 4 + Math.abs((seed + index * 7) % 5))),
      comment: pick(breakdownTemplates[name], seed, index)
    })),
    problems: rotatePick(mainProblems, seed, 5),
    fixes: rotatePick(quickFixes, seed + 3, 5),
    shareLine: pick(shareLines, seed)
  };
}

function scoreColor(score) {
  if (score < 50) return 'var(--red)';
  if (score <= 75) return 'var(--orange)';
  return 'var(--green)';
}

function renderEmptyState() {
  loadingScreen.style.display = 'none';
  resultScreen.classList.add('active');
  resultScreen.innerHTML = `
    <div class="empty-url">
      <h1>Roast Result</h1>
      <p>No URL was provided. Go back to <a href="index.html">RoastMine</a>, paste a website URL, and let the AI be professionally rude.</p>
    </div>
  `;
}

function renderBullets(elementId, items) {
  const list = document.getElementById(elementId);
  list.innerHTML = '';
  items.forEach(item => {
    const li = document.createElement('li');
    const span = document.createElement('span');
    span.textContent = item;
    li.appendChild(span);
    list.appendChild(li);
  });
}

function renderResult(data) {
  document.documentElement.style.setProperty('--score-color', scoreColor(data.score));
  document.getElementById('displayUrl').textContent = data.url;
  document.getElementById('globalScore').textContent = data.score;
  document.getElementById('scoreLine').textContent = `"${data.scoreLine}"`;
  document.getElementById('verdictText').textContent = data.verdict;
  document.getElementById('shareLine').textContent = `"${data.shareLine}"`;

  const breakdown = document.getElementById('breakdownList');
  breakdown.innerHTML = '';
  data.breakdown.forEach(item => {
    const row = document.createElement('div');
    row.className = 'breakdown-row';
    row.innerHTML = `
      <div class="breakdown-name"></div>
      <div class="breakdown-score"></div>
      <div class="breakdown-comment"></div>
    `;
    row.querySelector('.breakdown-name').textContent = item.name;
    row.querySelector('.breakdown-score').textContent = `${item.score}/10`;
    row.querySelector('.breakdown-comment').textContent = `→ ${item.comment}`;
    breakdown.appendChild(row);
  });

  renderBullets('problemsList', data.problems);
  renderBullets('fixesList', data.fixes);

  const share = data.shareLine;
  document.getElementById('shareX').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(share)}`;
  document.getElementById('copyButton').addEventListener('click', async () => {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(share);
    } else {
      const textarea = document.createElement('textarea');
      textarea.value = share;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      textarea.remove();
    }
    const status = document.getElementById('copyStatus');
    status.style.display = 'block';
    setTimeout(() => { status.style.display = 'none'; }, 2400);
  });

  loadingScreen.style.display = 'none';
  resultScreen.classList.add('active');
}

const validUrl = normalizeUrl(submittedUrl);
if (!validUrl) {
  renderEmptyState();
} else {
  const delay = 2000 + Math.floor(Math.random() * 2000);
  setTimeout(() => renderResult(generateRoastResult(validUrl)), delay);
}
</script>
</body>
</html>
