<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoastMine — Results</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <div class="container">
      <nav class="nav fade-up">
        <a class="brand" href="index.html">RoastMine</a>
        <div class="badge" id="audited-url">Preparing analysis</div>
      </nav>
      <section id="app" class="grid" style="gap:16px;"></section>
    </div>
  </main>

  <script>
    const url = new URLSearchParams(window.location.search).get('url') || 'Unknown website';
    const app = document.getElementById('app');
    document.getElementById('audited-url').textContent = url;

    function scoreColor(score) {
      if (score < 50) return 'var(--danger)';
      if (score <= 75) return 'var(--warning)';
      return 'var(--success)';
    }

    function animateScore(el, target) {
      const duration = 1100;
      const start = performance.now();
      function frame(t) {
        const p = Math.min((t - start) / duration, 1);
        const value = Math.round(target * (1 - Math.pow(1 - p, 3)));
        el.textContent = `${value}/100`;
        if (p < 1) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    async function getRoast(targetUrl) {
      const seed = Math.max(38, Math.min(92, 52 + (targetUrl.length % 34)));
      return {
        score: seed,
        verdict: [
          'This site under-explains value and over-relies on visual noise.',
          'The funnel lacks a decisive path from interest to action.',
          'Copy avoids risk, so users avoid commitment.',
          'Trust signals are present but weakly prioritized.'
        ],
        design: { score: Math.max(3, Math.round(seed / 10) - 1), text: 'Layout is competent but hierarchy collapses under scan speed.' },
        copywriting: { score: Math.max(2, Math.round(seed / 11)), text: 'Messaging is generic where specificity should close intent gaps.' },
        conversion: { score: Math.max(2, Math.round(seed / 12)), text: 'Calls to action exist, but momentum drops before commitment.' },
        ux: { score: Math.max(3, Math.round(seed / 10)), text: 'Navigation flow introduces friction exactly where clarity is required.' },
        trust: { score: Math.max(4, Math.round(seed / 9)), text: 'Proof elements are visible yet fail to dominate key decision moments.' },
        issues: [
          'Value proposition is delayed instead of immediate.',
          'Primary CTA competes with secondary elements.',
          'Headlines optimize for style over comprehension.',
          'Proof and outcomes are buried below low-value content.'
        ],
        actions: [
          'Rewrite above-the-fold copy into one promise and one measurable outcome.',
          'Reduce CTA choices to a single primary action per screen.',
          'Move testimonials and metrics directly beside the first CTA.',
          'Compress navigation to top user intents only.'
        ],
        shareLine: 'Your website looks premium, but clarity failure quietly destroys conversion every single day.'
      }
    }

    function render(result) {
      app.innerHTML = `
        <article class="card fade-up">
          <p class="section-title">Score</p>
          <div id="global-score" class="metric" style="color:${scoreColor(result.score)}">0/100</div>
        </article>

        <article class="card fade-up delay-1">
          <p class="section-title">Verdict</p>
          <ul class="list">${result.verdict.map(v => `<li>${v}</li>`).join('')}</ul>
        </article>

        <article class="card fade-up delay-1">
          <p class="section-title">Breakdown</p>
          ${['design','copywriting','conversion','ux','trust'].map(key => `
            <div class="breakdown-item">
              <div>
                <strong style="text-transform:capitalize;">${key}</strong>
                <div class="kicker">${result[key].text}</div>
              </div>
              <div class="small-score">${result[key].score}/10</div>
            </div>`).join('')}
        </article>

        <section class="grid grid-2 fade-up delay-2">
          <article class="card">
            <p class="section-title">Main Issues</p>
            <ul class="list">${result.issues.map(i => `<li>${i}</li>`).join('')}</ul>
          </article>
          <article class="card">
            <p class="section-title">Action Steps</p>
            <ul class="list">${result.actions.map(a => `<li>${a}</li>`).join('')}</ul>
          </article>
        </section>

        <article class="card fade-up delay-3">
          <p class="section-title">Share line</p>
          <div class="share-line">“${result.shareLine}”</div>
        </article>
      `;
      animateScore(document.getElementById('global-score'), result.score);
    }

    async function init() {
      app.innerHTML = `
        <article class="card fade-up">
          <div class="loader">
            <span class="loader-dot"></span>
            <span>Analyzing your website...</span>
          </div>
        </article>`;

      const delay = 2000 + Math.floor(Math.random() * 2000);
      await new Promise(r => setTimeout(r, delay));
      const result = await getRoast(url);
      render(result);
    }

    init();
  </script>
</body>
</html>
